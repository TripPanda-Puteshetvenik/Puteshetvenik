{% extends 'base.html' %}
{% block content %}
<div class="container py-5" style="max-width:500px">
    <div class="text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem"></i>
        <h2 class="mt-3">Изтрий пътепис</h2>
        <p class="text-muted">Сигурни ли сте, че искате да изтриете <strong>{{ post.title }}</strong>? Това действие е необратимо.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, изтрий</button>
            <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Откажи</a>
        </form>
    </div>
</div>
{% endblock %}
