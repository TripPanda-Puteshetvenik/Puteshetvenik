{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Регистрация — WanderBG{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">✈</span>
            <h2>Създай профил</h2>
            <p>Присъедини се към общността</p>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-accent w-100 mt-3">Регистрация</button>
        </form>
        <p class="auth-switch">Вече имаш профил? <a href="{% url 'login' %}">Влез</a></p>
    </div>
</div>
{% endblock %}
